name: Build Flow

on:
  workflow_call:

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      matrix:
        os:
          - ubuntu-24.04
          - macos-26
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run build script
        run: ./script/build

      - name: Upload build output
        if: matrix.os == 'ubuntu-24.04'
        uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: build/**
          retention-days: 1
