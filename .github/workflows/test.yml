name: test

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - build
    types:
      - completed

jobs:
  test:
    if: >
      github.event_name != 'workflow_run'
      || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run test script
        run: ./script/test
